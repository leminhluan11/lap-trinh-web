<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Fashion Store</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
        }

        header {
            background: #000;
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        .slider {
            width: 100%;
            height: 420px;
            overflow: hidden;
            position: relative;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: 1s;
        }

        .slide img {
            width: 100%;
            height: 420px;
            object-fit: cover;
        }

        .slide.active {
            opacity: 1;
        }

        .section {
            padding: 40px;
        }

        .section h2 {
            margin-bottom: 25px;
        }

        .featured {
            display: flex;
            gap: 30px;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        .featured img {
            width: 320px;
            border-radius: 10px;
        }

        .featured-info {
            flex: 1;
        }

        .featured-price {
            font-size: 28px;
            color: red;
        }

        .old-price {
            text-decoration: line-through;
            font-size: 14px;
            color: gray;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .product {
            background: white;
            padding: 15px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .product:hover {
            transform: scale(1.03);
        }

        .product img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 8px;
        }

        .product-name {
            font-weight: bold;
            margin-top: 10px;
        }

        .product-price {
            color: red;
            font-size: 18px;
        }

        .filter-buttons {
            margin-bottom: 20px;
        }

        .filter-buttons button {
            padding: 10px 15px;
            border: none;
            background: black;
            color: white;
            margin-right: 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        footer {
            background: #111;
            color: white;
            padding: 30px;
            margin-top: 40px;
        }

        footer p {
            margin: 5px 0;
        }
        .product-bottom{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:8px;
}

.btn-order{
    background:#ff4d4f;
    color:white;
    border:none;
    padding:6px 12px;
    border-radius:6px;
    cursor:pointer;
    font-size:13px;
}

.btn-order:hover{
    background:#ff7875;
}
.variant-box{
margin-top:8px;
}

.color-row{
display:flex;
gap:6px;
margin-top:4px;
}

.color-dot{
width:16px;
height:16px;
border-radius:50%;
border:1px solid #ccc;
cursor:pointer;
}

.size-row{
display:flex;
gap:6px;
margin-top:4px;
}

.size-btn{
border:1px solid #ddd;
padding:2px 6px;
font-size:12px;
cursor:pointer;
border-radius:4px;
}

.size-btn.active{
background:#000;
color:white;
}
.old-price{
color:#999;
font-size:14px;
text-decoration:line-through;
margin-right:6px;
}

.sale-price{
color:#e60023;
font-size:18px;
font-weight:bold;
}
    </style>
</head>

<body>

    <header>
        <h1>Fashion Store</h1>

        <nav>
            <a href="index.html">Trang chủ</a>
            <a href="cart.html">Giỏ hàng</a>
        </nav>
    </header>


    <div class="slider">

        <div class="slide active">
            <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
        </div>

        <div class="slide">
            <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d">
        </div>

        <div class="slide">
            <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8">
        </div>

    </div>



    <div class="section">

        <h2>Sản phẩm nổi bật</h2>

        <div id="featuredProduct"></div>

    </div>



    <div class="section">

        <h2>Tất cả sản phẩm</h2>

        <div class="filter-buttons" id="categoryFilters"></div>

        <div class="products" id="productList"></div>
        

    </div>


    <footer>

        <p>Fashion Store</p>
        <p>Địa chỉ: 123 Nguyễn Trãi, Hà Nội</p>
        <p>Email: fashionstore@gmail.com</p>
        <p>Điện thoại: 0988888888</p>
        <p>Facebook: fb.com/fashionstore</p>
        <p>Zalo: 0988888888</p>

    </footer>


    <script>
const selectedVariants = {}
const API = "http://localhost:5000/api/products";

let allProducts = [];

const token = localStorage.getItem("token");

fetch(API, {
    headers: token ? {
        "Authorization": "Bearer " + token
    } : {}
})
.then(res => res.json())
.then(data => {

    // đảm bảo rating luôn có
    data.forEach(p => {
        p.rating = p.rating ?? 0;
    });

    allProducts = data;

    renderProducts(data);
    renderCategories(data);
    renderFeatured(data);

})
.catch(err => {
    console.error(err);
    alert("Không tải được sản phẩm");
});


function renderProducts(products) {

    const container = document.getElementById("productList");
    container.innerHTML = "";

    products.forEach(p => {

        let price = p.price ?? 0;

let finalPrice = p.finalPrice ?? price
let discount = p.discount ?? 0

let priceHTML = ""

if(discount > 0){

priceHTML = `
<div id="price-${p.id}" data-base="${price}">
<span class="old-price">
${price.toLocaleString()} đ
</span>
<span class="sale-price">
${finalPrice.toLocaleString()} đ
</span>
</div>
`

}else{

priceHTML = `
<div class="sale-price" id="price-${p.id}" data-base="${price}">
${price.toLocaleString()} đ
</div>
`

}

        container.innerHTML += `
        <div class="product">
            <img src="${p.thumbnail || 'https://via.placeholder.com/300'}">
            <div class="product-name">${p.name}</div>
            <div>${p.categoryName}</div>
            ${priceHTML}
            <div class="variant-box" id="variant-${p.id}"></div>
            <div class="product-bottom">
                <span>⭐ ${p.rating}</span>

                <button class="btn-order"
                onclick="addToCart(${p.id},'${p.name}',${p.price},'${p.thumbnail}')">
                Đặt hàng
                </button>
            </div>
        </div>
        `;
        renderVariants(p);
    });
}

function renderVariants(product){

    const box = document.getElementById("variant-" + product.id)

    if(!product.variants || product.variants.length === 0) return

    const colors = {}

    product.variants.forEach(v=>{
        if(!colors[v.colorHex]){
            colors[v.colorHex] = []
        }
        colors[v.colorHex].push(v)
    })

    let html = `<div class="color-row">`

    Object.keys(colors).forEach(hex=>{
        html += `
        <span 
            class="color-dot"
            style="background:${hex}"
            onclick="selectColor(${product.id}, '${hex}')">
        </span>`
    })

    html += `</div>`

    Object.keys(colors).forEach(hex=>{

        html += `<div class="size-row" id="size-${product.id}-${hex}" style="display:none">`

        colors[hex].forEach(v=>{
            html += `
            <span 
                class="size-btn"
                onclick="selectVariant(${product.id}, '${hex}', '${v.sizeName}', ${v.priceModifier || 0}, this)">
                ${v.sizeName}
            </span>
            `
        })

        html += `</div>`
    })

    box.innerHTML = html
}
function selectColor(productId, hex){

    const sizes = document.querySelectorAll(`#variant-${productId} .size-row`)
    sizes.forEach(s=>s.style.display="none")

    const target = document.getElementById(`size-${productId}-${hex}`)
    if(target) target.style.display="flex"

    if(!selectedVariants[productId])
        selectedVariants[productId] = {}

    selectedVariants[productId].color = hex
}
function selectVariant(productId, color, size, modifier, el){

    const priceEl = document.getElementById("price-" + productId)

    const basePrice = Number(priceEl.dataset.base)

const promoPrice = Number(priceEl.dataset.final || basePrice)

    document.querySelectorAll(`#variant-${productId} .size-btn`)
        .forEach(b=>b.classList.remove("active"))

    el.classList.add("active")

    const newPrice = basePrice + modifier

    priceEl.innerText = newPrice.toLocaleString() + " đ"

    selectedVariants[productId] = {
        color: color,
        size: size,
        modifier: modifier,
        finalPrice: newPrice
    }
}
function renderCategories(products) {

    const filters = document.getElementById("categoryFilters");

    const categories = [...new Set(products.map(p => p.categoryName))];

    filters.innerHTML = `<button onclick="renderProducts(allProducts)">Tất cả</button>`;

    categories.forEach(c => {
        filters.innerHTML += `
<button onclick="filterCategory(\`${c}\`)">${c}</button>
`;
    });

}


function filterCategory(category) {

    const filtered = allProducts.filter(p => p.categoryName == category);

    renderProducts(filtered);

}


function renderFeatured(products) {

    if (!products.length) return;

    // copy mảng để không làm hỏng dữ liệu gốc
    let sorted = [...products].sort((a, b) => b.rating - a.rating);

    let featured = sorted[0];

    document.getElementById("featuredProduct").innerHTML = `
    <div class="featured">
        <img src="${featured.thumbnail || 'https://via.placeholder.com/300'}">
        <div class="featured-info">
            <h3>${featured.name}</h3>
            <p>${featured.description || ""}</p>
            <div class="featured-price">
                ${featured.price.toLocaleString()} đ
            </div>
            <p>⭐ ${featured.rating}</p>
        </div>
    </div>
    `;

}


let slides = document.querySelectorAll(".slide");

let index = 0;

setInterval(() => {

    slides[index].classList.remove("active");

    index = (index + 1) % slides.length;

    slides[index].classList.add("active");

}, 4000);
function addToCart(id,name,price,thumbnail){

    let cart = JSON.parse(localStorage.getItem("cart")) || []

    let variant = selectedVariants[id]

    let finalPrice = price

    if(variant){
        finalPrice = variant.finalPrice
    }

    const existing = cart.find(p => 
        p.id === id &&
        p.color === variant?.color &&
        p.size === variant?.size
    )

    if(existing){
        existing.quantity += 1
    }else{
        cart.push({
            id:id,
            name:name,
            price:finalPrice,
            thumbnail:thumbnail,
            color:variant?.color || null,
            size:variant?.size || null,
            quantity:1
        })
    }

    localStorage.setItem("cart", JSON.stringify(cart))

    window.location.href = "cart.html"
}
products.forEach(p=>{

let relation = productPromotions.find(pp=>pp.productId == p.id)

if(!relation) return

let promo = promotions.find(pr=>pr.id == relation.promotionId)

if(!promo) return

let now = new Date()

if(!promo.isActive) return

if(new Date(promo.startDate) > now) return

if(new Date(promo.endDate) < now) return

if(promo.discountType === "Percent"){

p.discount = promo.discountValue

p.finalPrice = p.price - (p.price * promo.discountValue / 100)

}

if(promo.discountType === "Amount"){

p.discount = promo.discountValue

p.finalPrice = p.price - promo.discountValue

}

})
allProducts = products
renderProducts(products)
renderCategories(products)
renderFeatured(products)
</script>

</body>

</html>
