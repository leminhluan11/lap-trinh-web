<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đặt hàng - Fashion Store</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        header {
            background: #000;
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        .checkout-container {
            max-width: 1000px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            padding: 0 20px;
        }

        .checkout-form {
            background: white;
            padding: 25px;
            border-radius: 10px;
        }

        .form-section {
            margin-bottom: 25px;
        }

        .form-section h3 {
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .payment-methods {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .payment-option {
            display: flex;
            align-items: center;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .payment-option:hover {
            border-color: #667eea;
        }

        .payment-option.selected {
            border-color: #667eea;
            background: #f0f0ff;
        }

        .payment-option input {
            margin-right: 10px;
        }

        .order-summary {
            background: white;
            padding: 25px;
            border-radius: 10px;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .order-summary h3 {
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .summary-items {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .summary-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .summary-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 5px;
            margin-right: 10px;
        }

        .summary-item-info {
            flex: 1;
        }

        .summary-item-name {
            font-size: 14px;
            font-weight: bold;
        }

        .summary-item-qty {
            font-size: 12px;
            color: #666;
        }

        .summary-item-variant {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }

        .summary-item-price {
            font-size: 14px;
            font-weight: bold;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .summary-total {
            font-size: 18px;
            font-weight: bold;
            border-top: 2px solid #ddd;
            padding-top: 15px;
            margin-top: 15px;
        }

        .summary-total .amount {
            color: red;
            font-size: 22px;
        }

        .place-order-btn {
            width: 100%;
            padding: 15px;
            background: #52c41a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .place-order-btn:hover {
            background: #73d13d;
        }

        .place-order-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        footer {
            background: #111;
            color: white;
            padding: 30px;
            margin-top: 40px;
            text-align: center;
        }

        footer p {
            margin: 5px 0;
        }

        .error {
            color: red;
            font-size: 12px;
            margin-top: 5px;
        }

        .success-message {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 10px;
            margin: 40px auto;
            max-width: 500px;
        }

        .success-icon {
            font-size: 60px;
            color: #52c41a;
            margin-bottom: 20px;
        }

        .success-message h2 {
            color: #52c41a;
            margin-bottom: 15px;
        }

        .success-message p {
            color: #666;
            margin-bottom: 10px;
        }

        .order-code {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Fashion Store</h1>
        <nav>
            <a href="index.html">Trang chủ</a>
            <a href="sanpham.html">Sản phẩm</a>
            <a href="cart.html">Giỏ hàng</a>
        </nav>
    </header>

    <div id="checkoutContent" class="checkout-container">
    </div>

    <footer>
        <p>Fashion Store</p>
        <p>Địa chỉ: 123 Nguyễn Trãi, Hà Nội</p>
        <p>Email: fashionstore@gmail.com</p>
        <p>Điện thoại: 0988888888</p>
    </footer>

    <script>
        const API_ORDERS = "http://localhost:5000/api/orders";

        function loadCheckout() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const container = document.getElementById('checkoutContent');

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="success-message">
                        <h2>Giỏ hàng trống</h2>
                        <p>Vui lòng thêm sản phẩm vào giỏ hàng trước khi đặt hàng.</p>
                        <a href="sanpham.html" class="continue-shopping">Tiếp tục mua sắm</a>
                    </div>
                `;
                return;
            }

            let subtotal = 0;
            let itemsHTML = '';

            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;

                itemsHTML += `
                    <div class="summary-item">
                        <img src="${item.thumbnail || 'https://via.placeholder.com/50'}" alt="${item.name}">
                        <div class="summary-item-info">
                            <div class="summary-item-name">${item.name}</div>
                            <div class="summary-item-variant">
                                ${item.color ? `<span class="variant-color">Màu: <span class="color-preview" style="background:${item.color}; width:10px; height:10px; display:inline-block; border-radius:50%; border:1px solid #ddd; vertical-align:middle;"></span></span>` : ''}
                                ${item.size ? `<span class="variant-size"> | Size: ${item.size}</span>` : ''}
                            </div>
                            <div class="summary-item-qty">x${item.quantity}</div>
                        </div>
                        <div class="summary-item-price">${itemTotal.toLocaleString()} đ</div>
                    </div>
                `;
            });

            const shippingFee = subtotal > 500000 ? 0 : 30000;
            const total = subtotal + shippingFee;

            container.innerHTML = `
                <div class="checkout-form">
                    <form id="orderForm" onsubmit="placeOrder(event)">
                        <div class="form-section">
                            <h3>Thông tin người nhận</h3>
                            <div class="form-group">
                                <label>Họ và tên *</label>
                                <input type="text" id="shippingName" required>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Số điện thoại *</label>
                                    <input type="tel" id="shippingPhone" required>
                                </div>
                                <div class="form-group">
                                    <label>Email</label>
                                    <input type="email" id="shippingEmail">
                                </div>
                            </div>
                        </div>

                        <div class="form-section">
                            <h3>Địa chỉ giao hàng</h3>
                            <div class="form-group">
                                <label>Địa chỉ chi tiết *</label>
                                <textarea id="shippingAddress" required></textarea>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Tỉnh/Thành phố</label>
                                    <input type="text" id="province">
                                </div>
                                <div class="form-group">
                                    <label>Quận/Huyện</label>
                                    <input type="text" id="district">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Phường/Xã</label>
                                <input type="text" id="ward">
                            </div>
                        </div>

                        <div class="form-section">
                            <h3>Phương thức thanh toán</h3>
                            <div class="payment-methods">
                                <label class="payment-option selected">
                                    <input type="radio" name="paymentMethod" value="COD" checked>
                                    <span>Thanh toán khi nhận hàng (COD)</span>
                                </label>
                                <label class="payment-option">
                                    <input type="radio" name="paymentMethod" value="BankTransfer">
                                    <span>Chuyển khoản ngân hàng</span>
                                </label>
                                <label class="payment-option">
                                    <input type="radio" name="paymentMethod" value="Momo">
                                    <span>Thanh toán qua MoMo</span>
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="place-order-btn">Đặt hàng</button>
                    </form>
                </div>

                <div class="order-summary">
                    <h3>Đơn hàng của bạn (${cart.length} sản phẩm)</h3>
                    <div class="summary-items">
                        ${itemsHTML}
                    </div>
                    <div class="summary-row">
                        <span>Tạm tính:</span>
                        <span>${subtotal.toLocaleString()} đ</span>
                    </div>
                    <div class="summary-row">
                        <span>Phí vận chuyển:</span>
                        <span>${shippingFee === 0 ? 'Miễn phí' : shippingFee.toLocaleString() + ' đ'}</span>
                    </div>
                    <div class="summary-row summary-total">
                        <span>Tổng cộng:</span>
                        <span class="amount">${total.toLocaleString()} đ</span>
                    </div>
                </div>
            `;

            document.querySelectorAll('.payment-option').forEach(option => {
                option.addEventListener('click', function() {
                    document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected'));
                    this.classList.add('selected');
                });
            });
        }

        async function placeOrder(event) {
            event.preventDefault();

            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            if (cart.length === 0) {
                alert('Giỏ hàng trống!');
                return;
            }

            const shippingName = document.getElementById('shippingName').value.trim();
            const shippingPhone = document.getElementById('shippingPhone').value.trim();
            const shippingAddress = document.getElementById('shippingAddress').value.trim();
            const province = document.getElementById('province').value.trim();
            const district = document.getElementById('district').value.trim();
            const ward = document.getElementById('ward').value.trim();
            const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked').value;

            if (!shippingName || !shippingPhone || !shippingAddress) {
                alert('Vui lòng nhập đầy đủ thông tin bắt buộc!');
                return;
            }

            const fullAddress = `${shippingAddress}${ward ? ', ' + ward : ''}${district ? ', ' + district : ''}${province ? ', ' + province : ''}`;

            let subtotal = 0;
            cart.forEach(item => {
                subtotal += item.price * item.quantity;
            });
            const shippingFee = subtotal > 500000 ? 0 : 30000;
            const totalAmount = subtotal;
            const finalAmount = subtotal + shippingFee;

            const orderData = {
                orderCode: 'ORD' + Date.now(),
                shippingName: shippingName,
                shippingAddress: fullAddress,
                shippingPhone: shippingPhone,
                totalAmount: totalAmount,
                discountAmount: 0,
                shippingFee: shippingFee,
                finalAmount: finalAmount,
                paymentMethod: paymentMethod,
                paymentStatus: 'Unpaid',
                status: 0,
                orderDetails: cart.map(item => ({
                    productVariantId: item.variantId || item.id,
                    productName: item.name,
                    sku: 'SKU' + item.id,
                    thumbnail: item.thumbnail,
                    quantity: item.quantity,
                    unitPrice: item.price,
                    color: item.color || null,
                    size: item.size || null
                }))
            };

            const token = localStorage.getItem('token');

            try {
                const response = await fetch(API_ORDERS, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': token ? 'Bearer ' + token : ''
                    },
                    body: JSON.stringify(orderData)
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.removeItem('cart');
                    
                    document.getElementById('checkoutContent').innerHTML = `
                        <div class="success-message">
                            <div class="success-icon">&#10004;</div>
                            <h2>Đặt hàng thành công!</h2>
                            <p>Cảm ơn bạn đã đặt hàng tại Fashion Store</p>
                            <div class="order-code">Mã đơn hàng: ${orderData.orderCode}</div>
                            <p>Chúng tôi sẽ liên hệ với bạn trong thời gian sớm nhất.</p>
                            <a href="sanpham.html" style="display:inline-block; margin-top:20px; padding:12px 30px; background:#667eea; color:white; text-decoration:none; border-radius:8px;">Tiếp tục mua sắm</a>
                        </div>
                    `;
                } else {
                    alert(data.message || 'Có lỗi xảy ra khi đặt hàng. Vui lòng thử lại!');
                }
            } catch (error) {
                console.error('Lỗi đặt hàng:', error);
                alert('Không thể kết nối đến server. Vui lòng kiểm tra kết nối mạng!');
            }
        }

        loadCheckout();
    </script>
</body>
</html>
